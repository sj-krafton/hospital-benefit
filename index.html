<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제휴 병원 할인 신청</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f7f8fa;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 16px 60px;
  }

  .container { max-width: 560px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 36px; }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #111;
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .header p { font-size: 14px; color: #666; line-height: 1.7; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.08);
  }

  .field { margin-bottom: 22px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 7px;
  }

  label .req { color: #e53935; margin-left: 2px; }

  input[type="text"],
  input[type="tel"],
  input[type="date"],
  textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: #111;
    background: #fff;
    transition: border-color 0.15s;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus {
    border-color: #1a56d8;
    box-shadow: 0 0 0 3px rgba(26,86,216,0.1);
  }

  textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

  .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
  }

  .checkbox-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #1a56d8;
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-item span { font-size: 14px; color: #333; user-select: none; }

  .hint { font-size: 12px; color: #999; margin-top: 5px; line-height: 1.5; }

  .date-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e8f0fe;
    color: #1a56d8;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 20px;
  }

  .date-tag button {
    background: none;
    border: none;
    color: #1a56d8;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 0;
  }

  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: #1a56d8;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  .submit-btn:hover { background: #1445b5; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  .notice { font-size: 12px; color: #aaa; text-align: center; margin-top: 14px; line-height: 1.6; }

  .success-box { display: none; text-align: center; padding: 48px 24px; }

  .success-icon {
    width: 64px;
    height: 64px;
    background: #e8f5e9;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 30px;
  }

  .success-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #111; }
  .success-box p { font-size: 14px; color: #666; line-height: 1.7; }

  .error-msg {
    display: none;
    background: #fff3f3;
    border: 1px solid #fcc;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #c0392b;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>제휴 병원 할인 신청</h1>
    <p>신청 내용을 확인 후 담당자가 병원 예약을 도와드립니다.<br>접수 후 1~2 영업일 내 연락드립니다.</p>
  </div>

  <div class="card">
    <div id="form-area">
      <div class="field">
        <label>이름 <span class="req">*</span></label>
        <input type="text" id="name" placeholder="홍길동" />
      </div>

      <div class="field">
        <label>연락처 <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="010-0000-0000" />
      </div>

      <div class="field">
        <label>원하는 병원 종류 <span class="req">*</span></label>
        <div class="checkbox-group" id="hospital-group">
          <label class="checkbox-item">
            <input type="checkbox" value="성형외과" />
            <span>성형외과</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="피부과" />
            <span>피부과</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="치과" />
            <span>치과</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label>생각하는 수술 / 시술 <span class="req">*</span></label>
        <input type="text" id="procedure" placeholder="예) 쌍꺼풀, 보톡스, 라미네이트 등" />
      </div>

      <div class="field">
        <label>선호 날짜 <span class="req">*</span></label>
        <div id="date-list" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px;"></div>
        <div style="display:flex; gap:8px; align-items:center;">
          <input type="date" id="date-picker" style="flex:1;" />
          <button type="button" onclick="addDate()" style="padding:10px 16px; background:#1a56d8; color:#fff; border:none; border-radius:10px; font-size:14px; font-family:inherit; cursor:pointer; white-space:nowrap;">+ 추가</button>
        </div>
        <p class="hint">날짜를 여러 개 추가할 수 있어요.</p>
      </div>

      <div class="field">
        <label>선호 시간대 <span class="req">*</span></label>
        <div class="checkbox-group" id="timeslot-group">
          <label class="checkbox-item">
            <input type="checkbox" value="오전 (10시~12시)" />
            <span>오전 (10시~12시)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="오후 (12시~17시)" />
            <span>오후 (12시~17시)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="저녁 (17시 이후)" />
            <span>저녁 (17시 이후)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="무관" />
            <span>무관</span>
          </label>
        </div>
      </div>

      <hr class="divider" />

      <div class="field">
        <label>특이사항</label>
        <textarea id="notes" placeholder="알러지 유무, 재수술/재시술 여부, 과거 시술 경험, 상담 방식 선호 (대면 상담 먼저 vs 바로 시술) 등 병원에 미리 알려야 할 내용이 있으면 적어주세요."></textarea>
        <p class="hint">선택 입력 — 없으면 비워두셔도 됩니다.</p>
      </div>

      <div id="error-msg" class="error-msg">필수 항목을 모두 입력해 주세요.</div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()">신청하기</button>

      <p class="notice">입력하신 정보는 병원 예약 연결 목적으로만 사용됩니다.</p>
    </div>

    <div class="success-box" id="success-box">
      <div class="success-icon">✅</div>
      <h2>신청이 완료되었습니다</h2>
      <p>접수 내용을 확인 후 입력하신 연락처로<br>1~2 영업일 내 안내드립니다.<br><br>감사합니다 😊</p>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFfXfd2dQbwGhbkz1u8H-zlkNr0bCdiHGsxzcxlxXxRKMQRDqw0-4fX9hQWengf78/exec";

const selectedDates = [];

function addDate() {
  const picker = document.getElementById("date-picker");
  const val = picker.value;
  if (!val) return;
  if (selectedDates.includes(val)) { picker.value = ""; return; }
  selectedDates.push(val);
  renderDates();
  picker.value = "";
}

function removeDate(val) {
  const idx = selectedDates.indexOf(val);
  if (idx > -1) selectedDates.splice(idx, 1);
  renderDates();
}

function renderDates() {
  const list = document.getElementById("date-list");
  list.innerHTML = selectedDates.map(d => {
    const label = d.replace(/-/g, ".").replace(/^(\d{4})\./, "$1년 ").replace(/\.(\d{2})\./, "월 $1").replace(/\.(\d{2})$/, "일");
    return `<span class="date-tag">${label}<button onclick="removeDate('${d}')" type="button">×</button></span>`;
  }).join("");
}

// 오늘 이전 날짜 선택 못하게
const today = new Date().toISOString().split("T")[0];
document.getElementById("date-picker").min = today;

async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const procedure = document.getElementById("procedure").value.trim();
  const notes = document.getElementById("notes").value.trim();
  const errorMsg = document.getElementById("error-msg");

  const hospitals = [...document.querySelectorAll("#hospital-group input:checked")]
    .map(cb => cb.value).join(", ");
  const timeslots = [...document.querySelectorAll("#timeslot-group input:checked")]
    .map(cb => cb.value).join(", ");
  const dates = selectedDates.join(", ");

  errorMsg.style.display = "none";

  if (!name || !phone || !hospitals || !procedure || !dates || !timeslots) {
    errorMsg.textContent = "필수 항목(*)을 모두 입력해 주세요.";
    errorMsg.style.display = "block";
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "제출 중...";

  const now = new Date();
  const timestamp = now.toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });

  const payload = { timestamp, name, phone, hospitals, procedure, dates, timeslots, notes };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    document.getElementById("form-area").style.display = "none";
    document.getElementById("success-box").style.display = "block";
  } catch (e) {
    errorMsg.textContent = "오류가 발생했습니다. 잠시 후 다시 시도해 주세요.";
    errorMsg.style.display = "block";
    btn.disabled = false;
    btn.textContent = "신청하기";
  }
}
</script>
</body>
</html>
